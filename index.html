<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Beat Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <header class="py-10 text-center">
        <h1 class="text-4xl font-bold tracking-tight">PRODUCER NAME</h1>
        <p class="text-gray-500 mt-2">Premium Beats | Instant Delivery</p>
    </header>

    <main class="max-w-5xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h2 class="text-xl font-semibold mb-1">Midnight Tokyo</h2>
                <span class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-3">Lo-Fi / Chill</span>
                
                <p class="text-gray-600 text-sm mb-4">Spacey pads and hard-hitting drums. Perfect for lyrical rappers.</p>
                
                <audio controls class="w-full mb-6 h-8">
                    <source src="I GOT TWO WORDS FOR YA.mp3" type="audio/mpeg">
                </audio>

                <div class="mt-auto">
                    <a href="your-stripe-checkout-link" class="block text-center bg-black text-white py-3 rounded-lg font-medium hover:bg-gray-800 transition">
                        Buy License - $29.99
                    </a>
                </div>
            </div>

            </div>
    </main>

</body>
</html>
