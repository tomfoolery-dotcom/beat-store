<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatVault | Premium Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern aesthetic scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        /* Subtle glow animation for the buy button */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0px rgba(59, 130, 246, 0); }
            50% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        }
        .buy-glow { animation: pulse-glow 3s infinite; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 font-sans antialiased selection:bg-blue-500/30">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-blue-600/10 blur-[120px] -z-10"></div>

    <header class="py-20 px-6 text-center">
        <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-500 mb-4">
            BEATVAULT
        </h1>
        <p class="text-slate-400 text-lg max-w-md mx-auto mb-8 font-light italic">
            "Your sound, perfected."
        </p>
        
        <div class="flex justify-center gap-6 text-[10px] uppercase tracking-[0.2em] text-blue-400 font-bold">
            <span>Instant Download</span>
            <span class="text-slate-700">•</span>
            <span>Untagged WAVs</span>
            <span class="text-slate-700">•</span>
            <span>100% Royalty Free</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="beat-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <footer class="py-20 text-center border-t border-slate-900 mt-20">
        <p class="text-slate-500 text-sm tracking-widest uppercase">&copy; 2026 BeatVault Productions</p>
    </footer>

    <script>
        // DATA: Just add your 15+ objects here
        const myBeats = [
            {
                title: "Midnight Tokyo",
                genre: "Lofi / Chill",
                description: "Nostalgic piano melodies and dusty textures.",
                previewUrl: "tokyo.mp3",
                buyUrl: "#",
                price: "$29"
            },
            {
                title: "Vortex",
                genre: "Trap",
                description: "Dark, aggressive 808s for a high-energy flow.",
                previewUrl: "vortex.mp3",
                buyUrl: "#",
                price: "$35"
            },
            // Add as many as you want below...
        ];

        const grid = document.getElementById('beat-grid');

        // Render function
        myBeats.forEach((beat, index) => {
            const card = `
                <div class="group relative bg-slate-900/40 backdrop-blur-md border border-slate-800 p-8 rounded-3xl transition-all duration-500 hover:border-blue-500/50 hover:bg-slate-900/60">
                    
                    <div class="absolute top-0 right-0 p-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="w-2 h-2 bg-blue-500 rounded-full blur-[4px]"></div>
                    </div>

                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-black text-blue-500 uppercase tracking-tighter mb-1 block">${beat.genre}</span>
                            <h2 class="text-2xl font-bold text-white tracking-tight">${beat.title}</h2>
                        </div>
                        <div class="bg-slate-800 px-3 py-1 rounded-full text-sm font-mono text-blue-300 border border-slate-700">
                            ${beat.price}
                        </div>
                    </div>
                    
                    <p class="text-slate-400 text-sm mb-8 leading-relaxed h-10 overflow-hidden">
                        ${beat.description}
                    </p>
                    
                    <div class="space-y-6">
                        <audio controls class="beat-player w-full h-10 rounded-lg filter invert opacity-70 hover:opacity-100 transition-all">
                            <source src="${beat.previewUrl}" type="audio/mpeg">
                        </audio>

                        <a href="${beat.buyUrl}" class="buy-glow block w-full text-center bg-white text-black hover:bg-blue-500 hover:text-white font-black py-4 rounded-2xl transition-all duration-300 uppercase text-xs tracking-widest">
                            Secure License
                        </a>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });

        // PLAYER LOGIC: Stop other beats when one starts
        const players = document.querySelectorAll('.beat-player');
        players.forEach(player => {
            player.addEventListener('play', () => {
                players.forEach(p => {
                    if (p !== player) {
                        p.pause();
                        p.currentTime = 0; // Optional: Reset to start
                    }
                });
            });
        });
        
    </script>
</body>
</html>
