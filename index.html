<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomfoolery Beats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Spotify-specific Hex Codes */
        :root {
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-card: #181818;
            --spotify-hover: #282828;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--spotify-black); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--spotify-green); }

        .btn-spotify {
            background-color: var(--spotify-green);
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .btn-spotify:hover {
            transform: scale(1.04);
            background-color: #1ed760;
        }
        
        /* Smooth fade for cards */
        .beat-card {
            background-color: var(--spotify-card);
            transition: background-color 0.3s ease;
        }
        .beat-card:hover {
            background-color: var(--spotify-hover);
        }
    </style>
</head>
